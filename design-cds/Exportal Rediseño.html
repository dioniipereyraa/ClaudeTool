<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Exportal — Sistema de diseño</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: 'Inter Tight', Inter, system-ui, sans-serif; background: #0B0D1F; color: #F3F2EE; }
  button { font-family: inherit; }

  @keyframes expSpin { to { transform: rotate(360deg); } }
  @keyframes expPulse { 0%,100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.25); opacity: 0.55; } }
  @keyframes expDraw { to { stroke-dashoffset: 0; } }
  @keyframes expPop { from { transform: scale(.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes expCheckIn { from { transform: scale(.4) rotate(-12deg); } to { transform: scale(1) rotate(0); } }
  @keyframes expRise { from { transform: translateY(6px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes expShimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
  @keyframes expDash { to { stroke-dashoffset: -16; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/tokens.jsx"></script>
<script type="text/babel" src="components/logo.jsx"></script>
<script type="text/babel" src="components/fabs.jsx"></script>
<script type="text/babel" src="components/onboarding.jsx"></script>
<script type="text/babel" src="components/promo.jsx"></script>
<script type="text/babel" src="components/claude-mock.jsx"></script>
<script type="text/babel" src="components/app.jsx"></script>
</body>
</html>
