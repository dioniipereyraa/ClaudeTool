<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title data-i18n="optionsPageTitle"></title>
    <style>
      /* Design tokens — Graphite Citrus / dark / cozy.
       * Mirrors TOKENS in content-script.js. Kept under --exp-* so both
       * surfaces feel like the same app. */
      :root {
        color-scheme: dark;
        --exp-bg: #0a0b0d;
        --exp-surface: #111315;
        --exp-surface2: #181a1d;
        --exp-line: rgba(255, 255, 255, 0.07);
        --exp-line-strong: rgba(255, 255, 255, 0.13);
        --exp-text: #f2f3f0;
        --exp-text-dim: rgba(242, 243, 240, 0.6);
        --exp-text-mute: rgba(242, 243, 240, 0.36);
        --exp-accent: #d4ff3a;
        --exp-accent-hover: #e4ff5c;
        --exp-accent-ink: #0a0b0d;
        --exp-ok: #86efac;
        --exp-err: #fca5a5;
        --exp-radius: 10px;
        --exp-radius-lg: 14px;
        --exp-pad: 16px;
        --exp-pad-sm: 10px;
        font-family:
          'Inter Tight',
          Inter,
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body {
        width: 420px;
        margin: 0;
        padding: 0;
        background: var(--exp-bg);
        color: var(--exp-text);
        line-height: 1.5;
      }
      .card {
        border-radius: var(--exp-radius-lg);
        overflow: hidden;
        background: var(--exp-surface);
        border: 1px solid var(--exp-line);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.32);
      }
      /* Chrome-like header: brand mark + name on the left, status chip
       * on the right. The chip color tracks the state via the
       * [data-state] attribute on .card. */
      header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        background: var(--exp-surface2);
        border-bottom: 1px solid var(--exp-line);
      }
      header .mark {
        display: inline-flex;
        width: 22px;
        height: 22px;
      }
      header h1 {
        font-size: 13px;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.01em;
        color: var(--exp-text);
      }
      .chip {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
      }
      .chip::before {
        content: '';
        width: 6px;
        height: 6px;
        border-radius: 3px;
        background: currentColor;
      }
      /* State-driven chip colors. "waiting" + "detected" both use accent
       * (lime) because they represent "not yet finalized"; the only
       * semantic green is "paired". */
      .card[data-state='paired'] .chip {
        background: color-mix(in srgb, var(--exp-ok) 14%, transparent);
        color: var(--exp-ok);
      }
      .card[data-state='detected'] .chip,
      .card[data-state='waiting'] .chip {
        background: color-mix(in srgb, var(--exp-accent) 14%, transparent);
        color: var(--exp-accent);
      }

      main {
        padding: 20px;
      }
      .headline {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 4px;
      }
      .subtitle {
        font-size: 12px;
        color: var(--exp-text-dim);
        margin: 0 0 18px;
        line-height: 1.5;
      }

      /* Token card with dashed border and inner solid input — echoes
       * OnboardingChrome from the design. The input's border goes lime
       * + shimmer animation in the 'detected' state. */
      .token-card {
        padding: 14px;
        border-radius: var(--exp-radius);
        background: var(--exp-surface2);
        border: 1px dashed var(--exp-line-strong);
      }
      .token-label {
        font-size: 11px;
        color: var(--exp-text-dim);
        margin-bottom: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .token-field {
        position: relative;
        overflow: hidden;
        border-radius: 8px;
        border: 1px solid var(--exp-line);
        background: var(--exp-surface);
        transition: border-color 180ms ease;
      }
      .card[data-state='detected'] .token-field {
        border-color: var(--exp-accent);
      }
      input#token {
        display: block;
        width: 100%;
        box-sizing: border-box;
        padding: 11px 14px;
        background: transparent;
        color: var(--exp-text);
        border: none;
        outline: none;
        font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
        font-size: 12.5px;
        letter-spacing: 0.02em;
      }
      input#token::placeholder {
        color: var(--exp-text-mute);
      }
      .shimmer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          color-mix(in srgb, var(--exp-accent) 22%, transparent) 50%,
          transparent 100%
        );
        transform: translateX(-100%);
      }
      .card[data-state='detected'] .shimmer {
        opacity: 1;
        animation: expShimmer 1.8s ease-in-out infinite;
      }
      @keyframes expShimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }
      .token-hint {
        font-size: 11px;
        color: var(--exp-text-mute);
        margin-top: 10px;
        line-height: 1.5;
      }
      .token-hint code {
        font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
        color: var(--exp-text-dim);
      }

      /* Primary action button. Transitions between "Emparejar →" (lime)
       * and "✓ Todo conectado" (surface2, informational) based on state.
       * In the 'waiting' state it stays lime but is click-disabled. */
      .primary {
        width: 100%;
        margin-top: 14px;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.01em;
        border-radius: var(--exp-radius);
        background: var(--exp-accent);
        color: var(--exp-accent-ink);
        border: none;
        cursor: pointer;
        font-family: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 120ms ease, color 120ms ease;
      }
      .primary:hover {
        background: var(--exp-accent-hover);
      }
      .primary .arrow,
      .primary .check {
        width: 16px;
        height: 16px;
      }
      .primary .check {
        display: none;
      }
      .card[data-state='paired'] .primary {
        background: var(--exp-surface2);
        color: var(--exp-text);
        cursor: default;
      }
      .card[data-state='paired'] .primary:hover {
        background: var(--exp-surface2);
      }
      .card[data-state='paired'] .primary .arrow {
        display: none;
      }
      .card[data-state='paired'] .primary .check {
        display: inline-block;
        color: var(--exp-ok);
      }
      .card[data-state='waiting'] .primary {
        opacity: 0.4;
        cursor: default;
      }
      .card[data-state='waiting'] .primary:hover {
        background: var(--exp-accent);
      }

      /* Local-first reassurance block — matches the lock-icon card in
       * design-cds/components/onboarding.jsx's OnboardingChrome. */
      .local-first {
        margin-top: 16px;
        padding: 12px;
        border-radius: var(--exp-radius);
        background: var(--exp-surface2);
        display: flex;
        align-items: flex-start;
        gap: 10px;
        font-size: 11px;
        color: var(--exp-text-dim);
        line-height: 1.5;
      }
      .local-first svg {
        flex-shrink: 0;
        margin-top: 2px;
        color: var(--exp-text-dim);
      }
      .local-first strong {
        color: var(--exp-text);
      }
      .local-first code {
        font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
        color: var(--exp-text);
      }

      /* Low-contrast "unpair" text button — only visible in the paired
       * state. Keeps the escape hatch without cluttering the happy path. */
      .unpair {
        display: none;
        margin: 14px auto 0;
        background: transparent;
        border: none;
        color: var(--exp-text-mute);
        font-family: inherit;
        font-size: 11px;
        cursor: pointer;
        padding: 4px 8px;
      }
      .unpair:hover {
        color: var(--exp-text-dim);
      }
      .card[data-state='paired'] .unpair {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="card" id="card" data-state="waiting">
      <header>
        <span class="mark" aria-hidden="true">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="0" width="100" height="100" rx="28" fill="var(--exp-bg)" />
            <rect x="22" y="20" width="56" height="14" rx="2" fill="var(--exp-text)" />
            <rect x="22" y="20" width="14" height="60" rx="2" fill="var(--exp-text)" />
            <rect x="22" y="66" width="56" height="14" rx="2" fill="var(--exp-text)" />
            <rect x="36" y="43" width="36" height="14" rx="2" fill="var(--exp-accent)" />
            <path d="M 72 50 L 82 50" stroke="var(--exp-accent)" stroke-width="14" stroke-linecap="round" />
          </svg>
        </span>
        <h1 data-i18n="optionsH1"></h1>
        <span class="chip"><span id="chip-text"></span></span>
      </header>

      <main>
        <h2 class="headline" id="headline"></h2>
        <div class="subtitle" id="subtitle"></div>

        <div class="token-card">
          <div class="token-label" data-i18n="tokenLabel"></div>
          <div class="token-field">
            <input
              id="token"
              type="text"
              spellcheck="false"
              autocomplete="off"
              data-i18n-placeholder="tokenPlaceholder"
            />
            <span class="shimmer" aria-hidden="true"></span>
          </div>
          <div class="token-hint" data-i18n="tokenHint"></div>
        </div>

        <button id="primary" type="button" class="primary">
          <span id="primary-label"></span>
          <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 12h14M13 6l6 6-6 6" />
          </svg>
          <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 6 9 17l-5-5" />
          </svg>
        </button>

        <div class="local-first">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <div>
            <strong data-i18n="localFirstLead"></strong>
            <span data-i18n="localFirstBody"></span>
          </div>
        </div>

        <button id="unpair" type="button" class="unpair" data-i18n="unpairButton"></button>
      </main>
    </div>

    <script src="options.js" type="module"></script>
  </body>
</html>
