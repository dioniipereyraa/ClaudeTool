<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title data-i18n="optionsPageTitle"></title>
    <style>
      :root {
        color-scheme: light dark;
        --brand-navy: #1e1b4b;
        --accent: #fb923c;
        --accent-hover: #f97316;
        --ok: #16a34a;
        --err: #dc2626;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
      }
      body {
        max-width: 560px;
        margin: 0;
        padding: 24px;
        line-height: 1.5;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 4px;
      }
      .subtitle {
        margin: 0 0 20px;
        color: color-mix(in srgb, currentColor 60%, transparent);
        font-size: 13px;
      }
      .status-banner {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 13px;
        font-weight: 500;
      }
      .status-banner[data-state='missing'] {
        background: color-mix(in srgb, var(--err) 12%, transparent);
        color: var(--err);
      }
      .status-banner[data-state='ok'] {
        background: color-mix(in srgb, var(--ok) 12%, transparent);
        color: var(--ok);
      }
      .status-banner .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }
      h2 {
        font-size: 14px;
        margin: 24px 0 10px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: color-mix(in srgb, currentColor 70%, transparent);
      }
      ol.steps {
        padding-left: 22px;
        margin: 0 0 16px;
      }
      ol.steps li {
        margin-bottom: 10px;
      }
      code,
      kbd {
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-size: 12.5px;
        padding: 1px 6px;
        border-radius: 4px;
        background: color-mix(in srgb, currentColor 10%, transparent);
      }
      kbd {
        border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
        font-weight: 600;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-size: 13px;
        border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
        border-radius: 6px;
        background: transparent;
        color: inherit;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      button {
        padding: 9px 16px;
        font-size: 13px;
        font-weight: 500;
        border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
        border-radius: 6px;
        background: color-mix(in srgb, currentColor 8%, transparent);
        color: inherit;
        cursor: pointer;
      }
      button:hover {
        background: color-mix(in srgb, currentColor 14%, transparent);
      }
      button.primary {
        background: var(--accent);
        color: var(--brand-navy);
        border-color: var(--accent);
        font-weight: 700;
      }
      button.primary:hover {
        background: var(--accent-hover);
      }
      #status {
        margin-top: 12px;
        font-size: 12px;
        min-height: 1em;
      }
      #status[data-kind='ok'] {
        color: var(--ok);
      }
      #status[data-kind='err'] {
        color: var(--err);
      }
      .hint {
        margin-top: 6px;
        font-size: 12px;
        color: color-mix(in srgb, currentColor 60%, transparent);
      }
    </style>
  </head>
  <body>
    <h1 data-i18n="optionsH1"></h1>
    <p class="subtitle" data-i18n="optionsSubtitle"></p>

    <div id="banner" class="status-banner" data-state="missing">
      <span class="dot"></span>
      <span id="banner-text"></span>
    </div>

    <h2 data-i18n="howToGetToken"></h2>
    <ol class="steps">
      <li data-i18n="stepInstall"></li>
      <li data-i18n="stepOpenPalette"></li>
      <li data-i18n="stepCopyToken"></li>
    </ol>

    <label for="token" data-i18n="tokenLabel"></label>
    <input
      id="token"
      type="text"
      spellcheck="false"
      autocomplete="off"
      data-i18n-placeholder="tokenPlaceholder"
    />
    <div class="hint" data-i18n="tokenHint"></div>
    <div class="row">
      <button id="save" type="button" class="primary" data-i18n="saveButton"></button>
      <button id="clear" type="button" data-i18n="clearButton"></button>
    </div>
    <div id="status" aria-live="polite"></div>

    <script src="options.js" type="module"></script>
  </body>
</html>
